services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    labels:
      - "diun.enable=true"
    container_name: filebrowser
    restart: unless-stopped
    ports:
      - "${FILEBROWSER_PORT}:80"
    volumes:
      - ${MEDIA_PATH}:/srv
      - ${DB_FILE}:/database/filebrowser.db
      - ${SETTINGS_FILE}:/config/settings.json
    environment:
      - PUID=${PUID}  # Sostituisci con il tuo: id -u
      - PGID=${PGID}  # Sostituisci con il tuo: id -g
      - TZ=${TZ}
